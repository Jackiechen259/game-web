<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>贪吃蛇</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0b1020; color: #e6edf3; font-family: system-ui, sans-serif; }
      #wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
      canvas { background: #0d1426; border: 1px solid #1f2a44; image-rendering: pixelated; max-width: 100%; }
      p { margin: .5rem 0 0; opacity: .7; font-size: .85rem; }
    </style>
  </head>
  <body>
    <div id="wrap">
      <canvas id="game" width="320" height="320" aria-label="贪吃蛇游戏区域"></canvas>
      <p>方向键移动 · P 暂停 · 分数 <span id="score">0</span></p>
    </div>
    <script>
      (function () {
        const SDK = { source: "game-portal-sdk", version: 1, gameId: "snake" };
        function send(type, payload) {
          try { window.parent.postMessage({ ...SDK, type, payload }, "*"); } catch (e) {}
        }
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const cell = 16, cols = canvas.width / cell, rows = canvas.height / cell;
        let snake, dir, nextDir, food, score, timer, paused, over;
        function reset() {
          snake = [{ x: 8, y: 8 }, { x: 7, y: 8 }, { x: 6, y: 8 }];
          dir = { x: 1, y: 0 }; nextDir = dir; score = 0; paused = false; over = false;
          placeFood(); draw(); updateScore();
          send("GAME_READY", { version: "1.0.0" });
        }
        function placeFood() {
          do { food = { x: (Math.random() * cols) | 0, y: (Math.random() * rows) | 0 }; }
          while (snake.some(s => s.x === food.x && s.y === food.y));
        }
        function updateScore() { document.getElementById("score").textContent = String(score); }
        function step() {
          if (paused || over) return;
          dir = nextDir;
          const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
          if (head.x < 0 || head.y < 0 || head.x >= cols || head.y >= rows || snake.some(s => s.x === head.x && s.y === head.y)) {
            over = true; send("GAME_OVER", { score }); return;
          }
          snake.unshift(head);
          if (head.x === food.x && head.y === food.y) { score += 10; send("SCORE_UPDATED", score); placeFood(); updateScore(); }
          else snake.pop();
          draw();
        }
        function draw() {
          ctx.fillStyle = "#0d1426"; ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "#f06292"; ctx.fillRect(food.x * cell, food.y * cell, cell, cell);
          ctx.fillStyle = "#7dd3fc";
          for (const s of snake) ctx.fillRect(s.x * cell, s.y * cell, cell, cell);
        }
        window.addEventListener("keydown", function (e) {
          const k = e.key;
          if (k === "p" || k === "P") { paused = !paused; return; }
          if (k === "ArrowUp" && dir.y === 0) nextDir = { x: 0, y: -1 };
          else if (k === "ArrowDown" && dir.y === 0) nextDir = { x: 0, y: 1 };
          else if (k === "ArrowLeft" && dir.x === 0) nextDir = { x: -1, y: 0 };
          else if (k === "ArrowRight" && dir.x === 0) nextDir = { x: 1, y: 0 };
          if (k.startsWith("Arrow")) e.preventDefault();
        });
        window.addEventListener("message", function (e) {
          const m = e.data || {};
          if (m.source !== "game-portal-sdk" || m.gameId !== "snake") return;
          if (m.type === "PORTAL_RESTART") reset();
          if (m.type === "PORTAL_PAUSE") paused = true;
          if (m.type === "PORTAL_RESUME") paused = false;
        });
        reset();
        send("GAME_STARTED");
        timer = setInterval(step, 110);
        window.addEventListener("beforeunload", function () { clearInterval(timer); });
      })();
    </script>
  </body>
</html>
